      <stop offset="45%" stop-color="#fff1ca" stop-opacity="0.44"/>
      <stop offset="100%" stop-color="#fff1ca" stop-opacity="0"/>
    </radialGradient>
    <filter id="cloudBlur" x="-20%" y="-20%" width="140%" height="140%">
