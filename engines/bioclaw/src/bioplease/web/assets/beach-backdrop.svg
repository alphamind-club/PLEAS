<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Sunny beach shoreline backdrop">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42b8ff"/>
      <stop offset="38%" stop-color="#83d5ff"/>
      <stop offset="70%" stop-color="#b8ecff"/>
      <stop offset="100%" stop-color="#d7f6ff"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
