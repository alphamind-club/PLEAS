    <linearGradient id="deepWater" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f75a8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0d4c72" stop-opacity="0.42"/>
